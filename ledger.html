<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>unfinished - memory ledger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Memory Ledger</h1>
    <p class="subtitle">A schema-aware quad-ledger combining entries, events, intent tracks, and execution programs.</p>
    <p><a href="index.html">Back</a> · <a href="history.html">Open history</a> · <a href="constellation.html">View constellation</a> · <a href="forge.html">Open mutation forge</a> · <a href="governance.html">Open governance</a> · <a href="protocol.html">Open protocol lab</a></p>

    <section class="panel ledger" aria-live="polite">
      <h2>Ledger status</h2>
      <p id="ledger-summary" class="muted">Loading...</p>
      <div class="metrics" role="list">
        <div class="metric" role="listitem">
          <p class="metric-label">Schema</p>
          <p id="ledger-schema" class="metric-value">--</p>
        </div>
        <div class="metric" role="listitem">
          <p class="metric-label">Semantics</p>
          <p id="ledger-semantics" class="metric-value">--</p>
        </div>
        <div class="metric" role="listitem">
          <p class="metric-label">Event types</p>
          <p id="ledger-types" class="metric-value">--</p>
        </div>
        <div class="metric" role="listitem">
          <p class="metric-label">Intents</p>
          <p id="ledger-intent-count" class="metric-value">--</p>
        </div>
      </div>
      <div class="forge-controls">
        <label class="control">
          Axis filter
          <select id="ledger-axis-filter">
            <option value="all">All</option>
            <option value="governance">Governance</option>
            <option value="memory">Memory</option>
            <option value="runtime">Runtime</option>
            <option value="interface">Interface</option>
            <option value="structure">Structure</option>
          </select>
        </label>
      </div>
      <section id="ledger-events" class="ledger-events" aria-live="polite"></section>
      <section id="ledger-intents" class="ledger-events" aria-live="polite"></section>
    </section>
  </main>
  <script type="module" src="site.js"></script>
</body>
</html>
