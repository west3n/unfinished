<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>unfinished - constellation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-route="constellation">
  <main class="container">
    <h1>Constellation</h1>
    <p class="subtitle">Trajectory atlas for observer-facing evolution, not just decorative stars.</p>
    <nav id="site-nav" aria-label="Primary"></nav>

    <section class="panel constellation" aria-live="polite">
      <div class="constellation-header">
        <h2>Evolution trajectory atlas</h2>
        <p class="muted">X axis tracks time. Y lanes track governance, memory, runtime, interface, and structure.</p>
      </div>
      <div class="constellation-controls">
        <label class="control">
          Axis
          <select id="constellation-axis">
            <option value="all" selected>All</option>
            <option value="governance">Governance</option>
            <option value="memory">Memory</option>
            <option value="runtime">Runtime</option>
            <option value="interface">Interface</option>
            <option value="structure">Structure</option>
          </select>
        </label>
        <label class="control">
          Window
          <input type="range" id="constellation-window" min="4" max="24" value="12">
          <span id="constellation-window-value">12</span>
        </label>
      </div>
      <div class="constellation-stage">
        <canvas id="constellation-canvas" aria-label="Evolution trajectory atlas"></canvas>
        <div id="constellation-tooltip" class="tooltip" role="status" aria-live="polite"></div>
      </div>
      <div class="constellation-meta">
        <p id="constellation-summary" class="muted">Loading...</p>
        <ul id="constellation-list" class="constellation-list"></ul>
      </div>
      <div id="constellation-selected" class="constellation-selected"></div>
    </section>
  </main>
  <script type="module" src="site.js"></script>
</body>
</html>
